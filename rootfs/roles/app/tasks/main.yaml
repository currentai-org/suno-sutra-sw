---
- name: Install onnxruntime-gpu 
  ansible.builtin.pip:
    name:
      - onnxruntime
      - onnxruntime-gpu
    extra_args: --index-url=https://pypi.jetson-ai-lab.io/jp6/cu126
  become: true

- name: Install additional deps
  ansible.builtin.apt:
    pkg:
    - libasound-dev
    - portaudio19-dev
    - libportaudio2
    - ffmpeg
    - flac
  become: true

- name: Copy root application code
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/../python"
    dest: ~/pocket-infer-sw
    delete: no
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=venv"

- name: Copy IO Expander Code
  ansible.builtin.synchronize:
    src: "{{ playbook_dir }}/../ioexpander"
    dest: ~/ioexpander
    delete: no
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=venv"

- name: Install global python dependencies
  ansible.builtin.pip:
    requirements: ~/pocket-infer-sw/python/requirements.txt
    virtualenv: ~/pocket-infer-sw/python/venv
    virtualenv_site_packages: yes
    
